<!DOCTYPE html>
<html>
<head>
  <title>Time Tracktor</title>
</head>
<body>

<h2>Time Tracktor (Live)</h2>

<input id="name" placeholder="Your name">
<input id="client" placeholder="Client">
<input id="hours" type="number" placeholder="Hours">
<button onclick="addEntry()">Add Entry</button>

<ul id="list"></ul>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  'https://hkqudsuaiokvaxodzyhk.supabase.co',
  'sb_publishable_ANk6xWjZew9EnU33EGrtkQ_PFf4-2iP'
);

async function addEntry() {
  const name = document.getElementById('name').value;
  const client = document.getElementById('client').value;
  const hours = document.getElementById('hours').value;

  const { error } = await supabase.from('time_entries').insert({
    member_name: name,
    client_id: client,
    duration_ms: hours * 3600000,
    entry_date: new Date().toISOString().split('T')[0],
    service: 'PR',
    billable: true
  });

  if (error) {
    alert('Error saving');
    console.log(error);
  } else {
    alert('Saved!');
    loadEntries();
  }
}

async function loadEntries() {
  const { data } = await supabase.from('time_entries').select('*');

  const list = document.getElementById('list');
  list.innerHTML = '';

  data.forEach(e => {
    const li = document.createElement('li');
    li.textContent = e.member_name + ' - ' + e.client_id + ' - ' + (e.duration_ms / 3600000) + 'h';
    list.appendChild(li);
  });
}

loadEntries();
</script>

</body>
</html>
